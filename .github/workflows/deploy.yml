name: Deploy Vite site to Pages

on:
  # 觸發條件：當 main 分支有 push 時 (如果你的預設分支是 master，請改成 master)
  push:
    branches: ['main']

# 設定 GitHub Actions 的權限，允許部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 允許只有一個 concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # 如果你用 yarn 或 pnpm，這裡請對應修改
          
      - name: Install dependencies
        run: npm install
        
      - name: Build project
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 將 Vite 打包好的 dist 資料夾上傳
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
